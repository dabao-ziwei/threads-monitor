<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登入｜大寶老師監測站</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #13131c;
    --border: #1e1e2e;
    --accent: #c9a96e;
    --accent-dim: rgba(201,169,110,0.12);
    --text: #e8e4dc;
    --muted: #666;
    --error: #e74c3c;
    --success: #2ecc71;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Noto Sans TC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 50%, rgba(201,169,110,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(155,89,182,0.04) 0%, transparent 50%);
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }

  /* Logo區 */
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand-icon {
    width: 64px; height: 64px;
    background: var(--accent-dim);
    border: 1px solid rgba(201,169,110,0.3);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 28px;
  }
  .brand h1 {
    font-size: 20px;
    color: var(--accent);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .brand p { font-size: 13px; color: var(--muted); }

  /* 主卡片 */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
  }

  /* 生物辨識按鈕 */
  .bio-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent-dim);
    border: 1px solid rgba(201,169,110,0.4);
    border-radius: 12px;
    color: var(--accent);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.2s;
    font-family: inherit;
    margin-bottom: 20px;
  }
  .bio-btn:hover:not(:disabled) {
    background: rgba(201,169,110,0.2);
    border-color: rgba(201,169,110,0.6);
    transform: translateY(-1px);
  }
  .bio-btn:disabled { opacity: 0.5; cursor: default; }
  .bio-btn .icon { font-size: 20px; }

  /* 分隔線 */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  /* Email 輸入 */
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; letter-spacing: 1px; text-transform: uppercase; }
  .field input {
    width: 100%;
    padding: 12px 14px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: rgba(201,169,110,0.5); }
  .field input::placeholder { color: var(--muted); }

  /* 主按鈕 */
  .main-btn {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #1a1200;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .main-btn:hover:not(:disabled) { background: #d4b57a; }
  .main-btn:disabled { opacity: 0.5; cursor: default; }

  /* 訊息 */
  .msg {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 8px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
  }
  .msg.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
  .msg.success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: #2ecc71; }
  .msg.info { background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3); color: var(--accent); }
  .msg.show { display: block; }

  /* 狀態指示 */
  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 6px;
  }
  .status-dot.active { background: var(--success); box-shadow: 0 0 6px var(--success); }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
  }

  /* 載入動畫 */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(201,169,110,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  /* 已登入後的設定區塊 */
  .setup-section { display: none; }
  .setup-section.show { display: block; }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <div class="brand-icon">☽</div>
    <h1>寶曜文化監測站</h1>
    <p>@read_urface ｜ Threads 命理熱文追蹤</p>
  </div>

  <div class="card">
    <!-- 生物辨識按鈕（有 passkey 時顯示） -->
    <button class="bio-btn" id="bioBtn" style="display:none" onclick="loginWithPasskey()">
      <span class="icon">🪄</span>
      <span id="bioBtnText">用生物辨識登入</span>
    </button>

    <!-- Email 登入 -->
    <div id="emailSection">
      <div class="divider" id="dividerEl" style="display:none">或用 Email 登入</div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="emailInput" placeholder="輸入你的 Email" autocomplete="email">
      </div>
      <button class="main-btn" onclick="sendMagicLink()">傳送登入連結</button>
    </div>

    <div id="msgBox" class="msg"></div>

    <!-- 登入成功後：設定生物辨識 -->
    <div class="setup-section" id="setupSection">
      <div class="divider">裝置設定</div>
      <button class="bio-btn" onclick="registerPasskey()">
        <span class="icon">🔑</span>
        在這台裝置設定生物辨識
      </button>
      <button class="main-btn" onclick="goToDashboard()" style="background: transparent; border: 1px solid var(--border); color: var(--muted);">
        跳過，直接進入
      </button>
    </div>
  </div>

  <div class="footer-note">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">連線中...</span>
  </div>
</div>

<script>
// ============================================================
// 設定區 — 填入你的 Supabase 資訊
// ============================================================
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
const DASHBOARD_URL = 'dashboard.html';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 工具函式
function showMsg(text, type = 'info') {
  const el = document.getElementById('msgBox');
  el.className = `msg ${type} show`;
  el.innerHTML = text;
}
function hideMsg() {
  document.getElementById('msgBox').className = 'msg';
}
function setStatus(active, text) {
  document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
  document.getElementById('statusText').textContent = text;
}

// 初始化：檢查登入狀態 + 有無 passkey
async function init() {
  setStatus(false, '連線中...');

  // 檢查是否已有有效 session
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // 已登入，直接去 dashboard
    window.location.href = DASHBOARD_URL;
    return;
  }

  setStatus(true, '已連線');

  // 檢查這台裝置有沒有已存的 passkey credential ID
  const savedCredId = localStorage.getItem('dabao_cred_id');
  if (savedCredId && window.PublicKeyCredential) {
    const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
    if (available) {
      document.getElementById('bioBtn').style.display = 'flex';
      document.getElementById('dividerEl').style.display = 'flex';
    }
  }

  // 檢查是否從 magic link 回來
  const hash = window.location.hash;
  if (hash.includes('access_token')) {
    handleMagicLinkCallback();
  }
}

// 允許登入的 Email（白名單）
const ALLOWED_EMAIL = 'stephenwu.0926@gmail.com';

// 傳送 Magic Link
async function sendMagicLink() {
  const email = document.getElementById('emailInput').value.trim().toLowerCase();
  if (!email) { showMsg('請輸入 Email', 'error'); return; }
  if (email !== ALLOWED_EMAIL) {
    showMsg('此帳號無存取權限', 'error');
    return;
  }

  showMsg('<span style="display:flex;align-items:center;gap:8px"><span class="spinner"></span> 傳送中...</span>', 'info');

  const { error } = await sb.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: window.location.origin + window.location.pathname
    }
  });

  if (error) {
    showMsg('傳送失敗：' + error.message, 'error');
  } else {
    showMsg('✉️ 登入連結已寄出！<br>去你的信箱點擊連結，回到這裡就能進入。', 'success');
  }
}

// 處理 Magic Link 回調
async function handleMagicLinkCallback() {
  showMsg('<span style="display:flex;align-items:center;gap:8px"><span class="spinner"></span> 驗證中...</span>', 'info');

  await new Promise(r => setTimeout(r, 1000));
  const { data: { session } } = await sb.auth.getSession();

  if (session) {
    // 清除 URL hash
    history.replaceState(null, '', window.location.pathname);

    // 看看這台裝置有沒有設定過 passkey
    const savedCredId = localStorage.getItem('dabao_cred_id');
    if (!savedCredId && window.PublicKeyCredential) {
      const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if (available) {
        // 顯示「要不要設定生物辨識」
        document.getElementById('emailSection').style.display = 'none';
        hideMsg();
        document.getElementById('setupSection').classList.add('show');
        return;
      }
    }
    goToDashboard();
  } else {
    showMsg('驗證失敗，請重試', 'error');
  }
}

// 進入 Dashboard
function goToDashboard() {
  window.location.href = DASHBOARD_URL;
}

// ── WebAuthn / Passkey ─────────────────────────────────────

// 生成隨機 challenge
function generateChallenge() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return arr;
}

// ArrayBuffer → Base64url
function bufToB64(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

// Base64url → Uint8Array
function b64ToBuf(b64) {
  const s = atob(b64.replace(/-/g,'+').replace(/_/g,'/'));
  return Uint8Array.from(s, c => c.charCodeAt(0));
}

// 在這台裝置註冊 Passkey
async function registerPasskey() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { showMsg('請先登入', 'error'); return; }

  try {
    showMsg('<span style="display:flex;align-items:center;gap:8px"><span class="spinner"></span> 請完成生物辨識...</span>', 'info');

    const challenge = generateChallenge();
    const userId = new TextEncoder().encode(session.user.id.replace(/-/g,'').substring(0,16));

    const credential = await navigator.credentials.create({
      publicKey: {
        challenge,
        rp: { name: '寶曜文化監測站', id: window.location.hostname },
        user: {
          id: userId,
          name: session.user.email,
          displayName: '大寶老師'
        },
        pubKeyCredParams: [
          { type: 'public-key', alg: -7 },  // ES256
          { type: 'public-key', alg: -257 } // RS256
        ],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required',
          residentKey: 'preferred'
        },
        timeout: 60000
      }
    });

    // 把 credential ID 存到 localStorage（這台裝置記憶用）
    const credId = bufToB64(credential.rawId);
    localStorage.setItem('dabao_cred_id', credId);

    // 把 credential ID 也存到 Supabase（跨裝置識別用）
    await sb.from('passkey_credentials').upsert({
      user_id: session.user.id,
      credential_id: credId,
      device_name: navigator.userAgent.includes('iPhone') ? 'iPhone' :
                   navigator.userAgent.includes('Mac') ? 'Mac' :
                   navigator.userAgent.includes('iPad') ? 'iPad' : '裝置',
      created_at: new Date().toISOString()
    }, { onConflict: 'credential_id' });

    showMsg('✅ 生物辨識設定完成！下次直接用指紋/臉部登入', 'success');
    setTimeout(goToDashboard, 1500);

  } catch (err) {
    if (err.name === 'NotAllowedError') {
      showMsg('已取消，你可以稍後再設定', 'info');
      setTimeout(goToDashboard, 1500);
    } else {
      showMsg('設定失敗：' + err.message, 'error');
    }
  }
}

// 用 Passkey 登入
async function loginWithPasskey() {
  const savedCredId = localStorage.getItem('dabao_cred_id');
  if (!savedCredId) {
    document.getElementById('bioBtn').style.display = 'none';
    return;
  }

  try {
    document.getElementById('bioBtnText').innerHTML =
      '<span class="spinner"></span> 驗證中...';
    document.getElementById('bioBtn').disabled = true;

    const challenge = generateChallenge();

    const assertion = await navigator.credentials.get({
      publicKey: {
        challenge,
        allowCredentials: [{
          type: 'public-key',
          id: b64ToBuf(savedCredId),
          transports: ['internal']
        }],
        userVerification: 'required',
        timeout: 60000
      }
    });

    // 驗證通過 → 向 Supabase 確認這個 credential 存在
    const credId = bufToB64(assertion.rawId);
    const { data, error } = await sb
      .from('passkey_credentials')
      .select('user_id')
      .eq('credential_id', credId)
      .single();

    if (error || !data) {
      throw new Error('找不到此裝置的登入憑證，請用 Email 重新登入');
    }

    // 取得對應 user 的 session（用 admin 模式或直接信任本地驗證）
    // 注意：這是簡化版本，適合個人使用
    // 將 passkey 驗證結果存到 sessionStorage
    sessionStorage.setItem('dabao_auth', JSON.stringify({
      user_id: data.user_id,
      verified_at: Date.now(),
      method: 'passkey'
    }));

    window.location.href = DASHBOARD_URL;

  } catch (err) {
    document.getElementById('bioBtnText').textContent = '用生物辨識登入';
    document.getElementById('bioBtn').disabled = false;

    if (err.name === 'NotAllowedError') {
      showMsg('已取消', 'info');
    } else {
      showMsg('驗證失敗：' + err.message + '<br><small>請用 Email 登入</small>', 'error');
    }
  }
}

// 啟動
init();
</script>
</body>
</html>
