<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads 命理情報站 - 戰略總部</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
(async function checkAuth() { 
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); 
  const { data: { session } } = await sb.auth.getSession(); 
  if (!session && !sessionStorage.getItem('dabao_auth')) window.location.href = 'index.html'; 
})();
</script>
<style>
  :root { --bg:#0f0f13; --card:#1a1a24; --card2:#22222f; --accent:#c9a96e; --text:#e8e4dc; --muted:#888; --green:#2ecc71; --red:#e74c3c; --border:#2e2e40; --bright:#ffffff; --claude:#d97757; --gemini:#4b8bf5; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 32px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  
  .drawer { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: var(--card); border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: 0.3s; z-index: 100; padding: 30px; overflow-y: auto; }
  .drawer.open { right: 0; }
  .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
  .drawer-overlay.open { display: block; }
  
  .tabs { display: flex; gap: 10px; margin: 20px 32px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .tab-btn { background: transparent; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 8px; }
  .tab-btn.active { color: var(--bg); background: var(--accent); }
  .panel { display: none; padding: 0 32px; }
  .panel.active { display: block; }
  
  .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 25px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; }
  .post-left { padding: 24px; border-right: 1px solid var(--border); }
  .post-right { padding: 24px; background: rgba(255,255,255,0.02); display: flex; flex-direction: column; }
  
  .meta { display: flex; gap: 10px; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .stats-row { margin-top: 15px; display: flex; gap: 15px; font-size: 12px; color: var(--muted); background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; }
  .stats-val { color: var(--accent); font-weight: bold; }
  
  .diagnosis-box { flex: 1; min-height: 120px; max-height: 250px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-size: 14px; line-height: 1.6; margin-top: 15px; position: relative; overflow-y: auto; color: #bbb; }
  .diagnosis-box.analyzing { animation: pulse 2s infinite; border-color: var(--accent); }
  @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
  
  .note-input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 10px; font-size: 13px; resize: none; }
  .btn-group { display: flex; gap: 10px; margin-top: 15px; }
  .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; border: 1px solid var(--border); }
  .btn-claude { background: var(--claude); color: white; border: none; flex: 1; }
  .btn-gemini { background: var(--gemini); color: white; border: none; flex: 1; }
  .btn-primary { background: var(--accent); color: var(--bg); border: none; }
  .btn-delete { background: var(--red); color: white; border: none; }
  .kw-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h2>Threads 作戰指揮中心</h2>
  <div style="display: flex; gap: 10px;">
    <button class="btn btn-primary" onclick="triggerTask('full')">⚡ 全域抓取</button>
    <button class="btn" style="background:var(--card2); color:white;" onclick="toggleDrawer(true)">⚙️ 關鍵字管理</button>
  </div>
</div>

<div id="notice" style="padding: 15px; background: var(--card2); margin: 10px 32px; border-left: 4px solid var(--accent); display: none; border-radius: 8px;"></div>

<div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
<div class="drawer" id="drawer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h3>⚙️ 關鍵字戰情室</h3>
    <button class="btn" onclick="toggleDrawer(false)" style="padding:4px 8px; border:none; background:transparent;">✕</button>
  </div>
  
  <div style="margin: 15px 0; display:flex; flex-direction:column; gap:10px;">
    <input type="text" id="newKw" placeholder="輸入新關鍵字..." style="padding:10px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:6px;">
    <div style="display:flex; gap:10px;">
      <button class="btn" onclick="addKeyword()" style="flex:1;">加入排程</button>
      <button class="btn" onclick="testKeyword()" style="flex:1; color:var(--accent); border-color:var(--accent);">🚀 72H 探測</button>
    </div>
  </div>
  
  <div id="radarBox" style="display:none; background:rgba(201,169,110,0.1); border:1px solid var(--accent); padding:15px; border-radius:8px; margin-bottom:15px;">
    <h4 style="color:var(--accent); margin-bottom:15px; font-size:14px; text-align:center;">📡 [<span id="radarKw"></span>] 72H 戰略報告</h4>
    <div style="display:flex; justify-content:space-around; text-align:center;">
      <div><div style="font-size:20px; font-weight:bold; color:#fff;" id="radarTotal">0</div><div style="font-size:11px; color:var(--muted); margin-top:4px;">總聲量(篇)</div></div>
      <div><div style="font-size:20px; font-weight:bold; color:#2ecc71;" id="radarViews">0</div><div style="font-size:11px; color:var(--muted); margin-top:4px;">最高瀏覽</div></div>
      <div><div style="font-size:20px; font-weight:bold; color:#e74c3c;" id="radarLikes">0</div><div style="font-size:11px; color:var(--muted); margin-top:4px;">最高按讚</div></div>
    </div>
  </div>

  <h4 style="margin-top:25px; margin-bottom:10px; padding-bottom:10px; border-bottom:1px solid var(--border);">📋 監控名單</h4>
  <div id="kwList"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('market')" id="btn-market">📊 市場爆文情報</button>
  <button class="tab-btn" onclick="switchTab('myposts')" id="btn-myposts">👤 我的專屬覆盤</button>
</div>

<div id="panel-market" class="panel active">
  <div id="marketPosts"></div>
</div>
<div id="panel-myposts" class="panel">
  <div id="myPosts"></div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let radarMonitorTimer = null; // 全域偵訊計時器

function showMsg(msg) { const n = document.getElementById('notice'); n.innerText = msg; n.style.display = 'block'; setTimeout(()=>n.style.display='none', 5000); }

function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById(`btn-${tab}`).classList.add('active');
}

function toggleDrawer(open) { 
  document.getElementById('drawer').classList.toggle('open', open); 
  document.getElementById('overlay').classList.toggle('open', open); 
  if (!open) stopRadarMonitor(); // 抽屜關閉，停止背景偵訊
}

function stopRadarMonitor() {
    if (radarMonitorTimer) {
        clearInterval(radarMonitorTimer);
        radarMonitorTimer = null;
        console.log('📡 背景偵訊計時器已暫停');
    }
}

function esc(str) { return (str||'').replace(/</g,'&lt;'); }

function nF(num) {
  if (num === undefined || num === null || num === '') return 0;
  if (typeof num === 'string' && num.includes('萬')) return num; 
  let val = parseFloat(String(num).replace(/,/g, '')); 
  if (isNaN(val)) return num; 
  if (val >= 10000) {
    let w = val / 10000;
    return (w % 1 === 0 ? w : w.toFixed(1)) + ' 萬';
  }
  return val.toLocaleString();
}

async function loadData() {
  const { data: kws } = await sb.from('monitored_keywords').select('*').order('added_at', { ascending: false });
  document.getElementById('kwList').innerHTML = (kws||[]).map(k => `
    <div class="kw-row">
      <span style="color:${k.is_active?'var(--text)':'var(--muted)'}; font-size:14px;">${esc(k.keyword)}</span>
      <div style="display:flex; gap:5px;">
        <button class="btn" style="font-size:11px; padding:4px 8px;" onclick="toggleKw('${k.keyword}', ${!k.is_active})">${k.is_active?'暫停':'啟用'}</button>
        <button class="btn btn-delete" style="font-size:11px; padding:4px 8px;" onclick="delKeyword('${k.id}')">刪除</button>
      </div>
    </div>`).join('');

  const { data: posts } = await sb.from('threads_posts').select('*').eq('is_test', false).order('scraped_at', { ascending: false }).limit(100);
  if (!posts) return;

  const uniquePostsMap = new Map();
  posts.forEach(p => {
    const finger = `${p.username}_${p.post_text.trim()}`;
    if (!uniquePostsMap.has(finger)) uniquePostsMap.set(finger, p);
  });
  const finalPosts = Array.from(uniquePostsMap.values());
  finalPosts.sort((a, b) => (parseFloat(String(b.views||0).replace(/,/g, '')) || 0) - (parseFloat(String(a.views||0).replace(/,/g, '')) || 0));

  const renderPost = (p) => `
    <div class="post-card">
      <div class="post-left">
        <div class="meta">
          <strong style="color:var(--accent)">@${esc(p.username)}</strong>
          <span style="background:var(--card2); padding:2px 6px; border-radius:4px;">${esc(p.keyword)}</span>
          <span>${p.post_time ? p.post_time.split('T')[0] : ''}</span>
          <a href="${p.post_url}" target="_blank" style="color:var(--accent); text-decoration:none; margin-left:auto; font-size:12px;">🔗 開啟原文</a>
        </div>
        <p style="white-space:pre-wrap; font-size:14px; line-height:1.7; color:#ddd; max-height: 350px; overflow-y: auto;">${esc(p.post_text)}</p>
        <div class="stats-row">
          <span>👀 <span class="stats-val">${nF(p.views)}</span> 瀏覽</span>
          <span>❤️ <span class="stats-val">${nF(p.likes)}</span> 讚</span>
          <span>💬 <span class="stats-val">${nF(p.comments)}</span> 留言</span>
        </div>
      </div>
      <div class="post-right">
        <textarea class="note-input" rows="2" placeholder="在此輸入您的觀察..." onblur="updateNote('${p.id}', this.value)">${p.user_notes || ''}</textarea>
        <div class="diagnosis-box" id="diag-${p.id}">
          ${p.ai_diagnosis ? `<strong>[${p.diagnosis_provider}] 診斷：</strong><br>${p.ai_diagnosis.replace(/\n/g, '<br>')}` : '尚未進行分析。'}
        </div>
        <div class="btn-group">
          <button class="btn btn-claude" onclick="analyzePost('${p.id}', 'Claude')">✨ Claude</button>
          <button class="btn btn-gemini" onclick="analyzePost('${p.id}', 'Gemini')">💎 Gemini</button>
          <button class="btn btn-delete" onclick="delPost('${p.id}')">🗑️ 刪除</button>
        </div>
      </div>
    </div>`;

  document.getElementById('marketPosts').innerHTML = finalPosts.filter(p => p.keyword !== '__my_posts__').map(renderPost).join('');
  document.getElementById('myPosts').innerHTML = finalPosts.filter(p => p.keyword === '__my_posts__').map(renderPost).join('');
}

// 🚀 [核心重寫] 讀取 keyword_stats 統計資料
async function fetchLatestStats(kw) {
    console.log(`📡 正在背景回收 [${kw}] 的最新戰報...`);
    const { data, error } = await sb.from('keyword_stats').select('*').eq('keyword', kw).maybeSingle();
    if (!error && data) {
        document.getElementById('radarTotal').innerText = data.post_count || 0;
        document.getElementById('radarViews').innerText = nF(data.max_view || 0);
        document.getElementById('radarLikes').innerText = nF(data.max_like || 0);
        
        // 判斷：若是 1 分鐘內更新的資料，代表成功抓回
        const lastUpdate = new Date(data.last_scanned_at).getTime();
        if (Date.now() - lastUpdate < 60000) { 
            console.log("✅ 情報已成功抓回，自動停止偵訊。");
            stopRadarMonitor();
        }
    }
}

async function testKeyword() {
  const kw = document.getElementById('newKw').value.trim(); if(!kw) return alert('請先輸入關鍵字');
  document.getElementById('radarKw').innerText = esc(kw);
  document.getElementById('radarTotal').innerText = '⏳';
  document.getElementById('radarViews').innerText = '⏳';
  document.getElementById('radarLikes').innerText = '⏳';
  document.getElementById('radarBox').style.display = 'block';
  
  triggerTask('test_search', kw);
  
  // 🚀 啟動自動回收機制
  stopRadarMonitor();
  radarMonitorTimer = setInterval(() => fetchLatestStats(kw), 3000);
}

async function triggerTask(type, kw = null) {
  showMsg('⏳ 傳送指令至家中主機...');
  const { data: task, error } = await sb.from('scrape_tasks').insert([{ task_type: type, target_keyword: kw }]).select().single();
  if (error) return showMsg('❌ 任務發送失敗');
  
  const channel = sb.channel('task-'+task.id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'scrape_tasks', filter: `id=eq.${task.id}` }, async (p) => {
    if (p.new.status === 'processing') showMsg('⚡ 家中主機已喚醒，正在處理中...');
    else if (p.new.status === 'failed_busy') { showMsg('⛔ 主機繁忙中。'); stopRadarMonitor(); sb.removeChannel(channel); }
    else if (p.new.status === 'completed') { 
      showMsg('✅ 任務已完成，同步資料中...'); 
      await loadData(); 
      sb.removeChannel(channel); 
    }
  }).subscribe();
}

async function addKeyword() {
  const kw = document.getElementById('newKw').value.trim(); if(!kw) return;
  await sb.from('monitored_keywords').insert([{ keyword: kw }]); loadData(); document.getElementById('newKw').value = '';
}
async function toggleKw(kw, active) { await sb.from('monitored_keywords').update({ is_active: active }).eq('keyword', kw); loadData(); }
async function delKeyword(id) {
  if(!confirm('確定刪除？')) return;
  await sb.from('monitored_keywords').delete().eq('id', id); loadData();
}
async function delPost(id) { await sb.from('threads_posts').delete().eq('id', id); loadData(); }
async function updateNote(postId, val) { await sb.from('threads_posts').update({ user_notes: val }).eq('id', postId); }

async function analyzePost(postId, provider) {
  const box = document.getElementById(`diag-${postId}`);
  box.classList.add('analyzing');
  box.innerHTML = `<div style="color:var(--accent)">⏳ 指令發送中...</div>`;
  const { data } = await sb.from('scrape_tasks').insert([{ task_type: 'ai_analyze', target_post_id: postId, target_keyword: provider }]).select().single();
  const channel = sb.channel('ai-'+data.id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'scrape_tasks', filter: `id=eq.${data.id}` }, (p) => {
    if (p.new.status === 'completed') { box.classList.remove('analyzing'); loadData(); sb.removeChannel(channel); }
  }).subscribe();
}

loadData();
</script>
</body>
</html>
