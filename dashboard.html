<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads 爆文指揮中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV3a3R6bHhsZHVxeWp5b29sZ3JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjYxNDksImV4cCI6MjA4ODcwMjE0OX0.kSCvE4tGJsxtqzjIZh4O1WVL5-oMCZYUixLRAkxfJws';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
</script>
<style>
  :root { --bg:#0f0f13; --card:#1a1a24; --card2:#22222f; --accent:#c9a96e; --text:#e8e4dc; --muted:#888; --green:#2ecc71; --red:#e74c3c; --border:#2e2e40; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; }
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 32px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .drawer { position: fixed; right: -400px; top: 0; width: 400px; height: 100%; background: var(--card); border-left: 1px solid var(--border); box-shadow: -10px 0 30px rgba(0,0,0,0.5); transition: 0.3s; z-index: 100; padding: 30px; overflow-y: auto; }
  .drawer.open { right: 0; }
  .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
  .drawer-overlay.open { display: block; }
  .tabs { display: flex; gap: 10px; margin: 20px 32px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .tab-btn { background: transparent; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 8px; }
  .tab-btn.active { color: var(--bg); background: var(--accent); }
  .panel { display: none; padding: 0 32px; }
  .panel.active { display: block; }
  .btn { padding: 8px 16px; background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--bg); border: none; font-weight: bold; }
  .btn-danger { color: var(--red); border-color: var(--red); background: transparent; }
  .kw-item { background: var(--card2); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
  .kw-count { font-size: 12px; color: var(--accent); font-weight: bold; margin-left: 5px; }
  .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative;}
  .meta { display: flex; gap: 10px; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .notice { padding: 15px; background: var(--card2); margin: 10px 32px; border-left: 4px solid var(--accent); display: none; border-radius: 8px; }
</style>
</head>
<body>

<div class="header">
  <h2>Threads 爆文指揮中心 <small style="font-size: 12px; color: var(--muted);">v1.4.0</small></h2>
  <div style="display: flex; gap: 10px;">
    <button class="btn btn-primary" onclick="triggerTask('full')">⚡ 全域抓取</button>
    <button class="btn" onclick="toggleDrawer(true)">⚙️ 關鍵字管理</button>
  </div>
</div>

<div id="notice" class="notice"></div>

<div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
<div class="drawer" id="drawer">
  <div style="display: flex; justify-content: space-between; margin-bottom: 25px;">
    <h3>⚙️ 關鍵字戰情室</h3>
    <button class="btn" onclick="toggleDrawer(false)">✕</button>
  </div>
  
  <div class="card" style="margin-bottom: 25px;">
    <h4>🆕 市場偵查</h4>
    <div style="display: flex; gap: 8px; margin-top: 10px;">
      <input type="text" id="newKw" placeholder="輸入搜尋詞..." style="flex:1; padding:10px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:6px;">
    </div>
    <button class="btn btn-primary" style="width:100%; margin-top: 10px;" onclick="scoutKeyword()">🕵️ 開始偵查</button>
    <div id="scoutResult" style="margin-top: 15px; font-size: 13px; display: none; background: #000; padding: 10px; border-radius: 6px; border: 1px dashed var(--accent);"></div>
  </div>

  <h4>📋 監控名單</h4>
  <div id="kwList" style="margin-top: 15px;"></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('market')" id="btn-market">📊 市場情報</button>
  <button class="tab-btn" onclick="switchTab('myposts')" id="btn-myposts">👤 我的覆盤</button>
</div>

<div id="panel-market" class="panel active"><div id="marketPosts"></div></div>
<div id="panel-myposts" class="panel"><div id="myPosts"></div></div>

<script>
function toggleDrawer(open) {
  document.getElementById('drawer').classList.toggle('open', open);
  document.getElementById('overlay').classList.toggle('open', open);
}

function showMsg(msg) { 
    const n = document.getElementById('notice'); 
    n.innerText = msg; n.style.display = 'block'; 
}

async function loadData() {
  const { data: kws } = await sb.from('monitored_keywords').select('*');
  const activeKeywords = (kws || []).map(k => k.keyword);
  
  const { data: stats } = await sb.from('keyword_stats').select('*');
  const statsMap = Object.fromEntries((stats||[]).map(s => [s.keyword, s.post_count]));

  document.getElementById('kwList').innerHTML = (kws||[]).map(k => `
    <div class="kw-item">
      <div class="kw-info">
        <span style="color:${k.is_active?'var(--text)':'var(--muted)'}">${k.keyword}</span>
        <span class="kw-count">(${statsMap[k.keyword] || 0})</span>
      </div>
      <div style="display:flex; gap:5px;">
        <button class="btn" style="font-size:11px; padding:4px 8px;" onclick="toggleKw('${k.keyword}', ${!k.is_active})">${k.is_active?'暫停':'恢復'}</button>
        <button class="btn btn-danger" style="font-size:11px; padding:4px 8px;" onclick="delKeyword('${k.keyword}')">🗑️</button>
      </div>
    </div>`).join('');

  // 關鍵修正：增加過濾條件 !is_test 以及 關鍵字必須在名單中
  const { data: posts } = await sb.from('threads_posts')
    .select('*')
    .eq('is_test', false) // 排除測試資料
    .order('scraped_at', { ascending: false })
    .limit(100);

  // 僅顯示目前監控中(且非測試)的內容
  const market = posts ? posts.filter(p => activeKeywords.includes(p.keyword) && p.keyword !== '__my_posts__') : [];
  const myPosts = posts ? posts.filter(p => p.keyword === '__my_posts__') : [];

  const renderPost = (p, isMine) => `
    <div class="post-card">
      <div style="position:absolute; right:20px; top:20px; display:flex; gap:10px;">
        <a href="${p.post_url}" target="_blank" class="btn" style="text-decoration:none; font-size:12px;">🔗 開啟</a>
        <button class="btn btn-danger" style="font-size:12px;" onclick="delPost('${p.id}')">🗑️</button>
      </div>
      <div class="meta">
        <strong style="color:var(--accent)">@${p.username}</strong>
        <span style="background:var(--card2); padding:2px 6px; border-radius:4px;">${p.keyword}</span>
        <span>${p.post_time ? p.post_time.split('T')[0] : ''}</span>
        ${p.is_viral ? '<span style="color:var(--red);">🔥 爆文</span>' : ''}
      </div>
      <p style="white-space:pre-wrap; font-size:14px; line-height:1.6; color:#ccc;">${p.post_text}</p>
      <div style="margin-top:12px; font-size:13px;">👀 ${p.views||0} ｜ ❤️ ${p.likes||0} ｜ 💬 ${p.comments||0}</div>
    </div>`;

  document.getElementById('marketPosts').innerHTML = market.map(p => renderPost(p, false)).join('');
  document.getElementById('myPosts').innerHTML = myPosts.map(p => renderPost(p, true)).join('');
}

async function scoutKeyword() {
  const kw = document.getElementById('newKw').value.trim(); if(!kw) return;
  const resBox = document.getElementById('scoutResult');
  resBox.style.display = 'block'; resBox.innerHTML = '🕵️ 正在偵查熱度中...';
  
  const { data, error } = await sb.from('scrape_tasks').insert([{ task_type: 'scout', target_keyword: kw }]).select().single();
  if (error) return resBox.innerHTML = '❌ 指令失敗';

  const channel = sb.channel('scout-'+data.id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'scrape_tasks', filter: `id=eq.${data.id}` }, (p) => {
    if (p.new.status === 'completed' && p.new.task_result) {
      const res = p.new.task_result;
      resBox.innerHTML = `
        <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">📊 偵查報告：【${kw}】</div>
        <li>即時熱度：約 ${res.total} 篇</li>
        <li>潛在爆文：${res.viralCount} 篇</li>
        <button class="btn btn-primary" style="width:100%; margin-top:10px;" onclick="addKeyword('${kw}')">確認加入監控清單</button>
      `;
      sb.removeChannel(channel);
    }
  }).subscribe();
}

async function addKeyword(kw) {
  const keyword = kw || document.getElementById('newKw').value.trim();
  if(!keyword) return;
  await sb.from('monitored_keywords').upsert([{ keyword, is_active: true }]);
  document.getElementById('scoutResult').style.display = 'none';
  loadData();
}

async function delKeyword(kw) {
  if(!confirm(`確定停止監控【${kw}】嗎？`)) return;
  await sb.from('monitored_keywords').delete().eq('keyword', kw);
  loadData();
}

async function triggerTask(type) {
  showMsg('⏳ 發送指令中...');
  const { error } = await sb.from('scrape_tasks').insert([{ task_type: type }]);
  if (error) showMsg('❌ 錯誤：' + error.message);
  else showMsg('✅ 已通知家中哨兵執行。');
}

async function toggleKw(kw, active) { await sb.from('monitored_keywords').update({ is_active: active }).eq('keyword', kw); loadData(); }
async function delPost(id) { await sb.from('threads_posts').delete().eq('id', id); loadData(); }
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById(`btn-${tab}`).classList.add('active');
}

loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
