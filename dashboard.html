<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大寶老師 - Threads 戰略儀表板 v1.9.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        /* 自定義捲軸樣式，讓介面更簡潔專業 */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1f2937; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #6b7280; }
        
        /* 鎖定全域，防止頁面跳動 */
        body { overflow: hidden; height: 100vh; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex flex-col">

    <header class="p-4 bg-gray-800 border-b border-gray-700 flex justify-between items-center shrink-0 shadow-lg z-10">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🔮</span>
            <h1 class="text-xl font-bold tracking-wider text-blue-400">大寶老師 Threads 戰略儀表板</h1>
        </div>
        <div class="flex space-x-3">
            <input id="keywordInput" type="text" placeholder="搜尋關鍵字..." class="bg-gray-700 px-4 py-2 rounded text-sm border border-gray-600 outline-none focus:border-blue-500 transition-all">
            <button onclick="sendTask('scout')" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded text-sm font-bold transition-all shadow-md active:scale-95">發動偵查</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden p-4 gap-4 bg-gray-950">
        
        <section class="w-1/3 flex flex-col bg-gray-800 rounded-xl border border-gray-700 shadow-xl overflow-hidden">
            <div class="p-3 bg-gray-700/50 text-sm font-bold border-b border-gray-700 flex items-center gap-2">
                <span>📊 爆文庫存</span>
                <span id="postCount" class="bg-blue-900 text-blue-200 text-xs px-2 py-0.5 rounded-full">0</span>
            </div>
            <div id="postList" class="flex-1 overflow-y-auto custom-scroll p-3 space-y-3">
                <div class="text-gray-500 text-center py-10 italic">載入資料庫中...</div>
            </div>
        </section>

        <section class="w-2/3 flex flex-col gap-4 overflow-hidden">
            
            <div class="h-[35%] bg-gray-800 rounded-xl border border-gray-700 shadow-xl flex flex-col overflow-hidden">
                <div class="p-3 bg-gray-700/50 text-sm font-bold flex justify-between items-center border-b border-gray-700">
                    <span class="flex items-center gap-2">📝 原文內容 & 老師筆記</span>
                    <button onclick="saveNotes()" class="text-xs bg-green-600 hover:bg-green-700 px-3 py-1 rounded transition-colors shadow">儲存更新</button>
                </div>
                <div class="flex-1 flex gap-4 p-4 overflow-hidden">
                    <div id="currentPostContent" class="w-1/2 overflow-y-auto custom-scroll text-gray-300 leading-relaxed text-sm whitespace-pre-wrap border-r border-gray-700 pr-4">
                        請先從左側選擇貼文...
                    </div>
                    <div class="w-1/2 flex flex-col">
                        <textarea id="userNotes" placeholder="在這裡記錄您對此貼文的紫微觀點或行銷想法..." class="flex-1 bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm text-blue-300 focus:ring-1 focus:ring-blue-500 outline-none resize-none custom-scroll"></textarea>
                    </div>
                </div>
            </div>

            <div class="flex-1 bg-gray-800 rounded-xl border border-gray-700 shadow-xl flex flex-col overflow-hidden">
                <div class="p-3 bg-gray-700/50 text-sm font-bold flex justify-between items-center border-b border-gray-700">
                    <div class="flex items-center gap-2">
                        <span class="text-blue-400">✨ Claude 4.6 戰略診斷</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="sendTask('ai_analyze', 'Claude')" class="text-xs bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded-full transition-all active:scale-95 shadow-lg">發動 AI 診斷</button>
                    </div>
                </div>
                <div id="aiDiagnosis" class="flex-1 overflow-y-auto custom-scroll p-6 bg-gray-900/30">
                    <div class="text-gray-500 italic">尚未發動分析，請點擊上方按鈕...</div>
                </div>
            </div>

        </section>
    </main>

    <script>
        // 請在此處填入您的 Supabase 設定
        const supabase = netlify.createClient('https://uwktzlxlduqyjyoolgrs.supabase.co', '您的KEY');

        async function loadPosts() {
            const { data, error } = await supabase.from('threads_posts').select('*').order('views', { ascending: false });
            if (error) return;
            const list = document.getElementById('postList');
            document.getElementById('postCount').innerText = data.length;
            list.innerHTML = data.map(post => `
                <div onclick='selectPost(${JSON.stringify(post).replace(/'/g, "&apos;")})' 
                     class="p-4 bg-gray-700 hover:bg-gray-600 rounded-lg cursor-pointer border border-transparent hover:border-blue-500 transition-all group">
                    <div class="text-xs text-gray-400 mb-1 flex justify-between">
                        <span>👁️ ${post.views}</span>
                        <span class="text-blue-400">${post.diagnosis_provider ? '✅ 已診斷' : ''}</span>
                    </div>
                    <div class="text-sm line-clamp-2 text-gray-200 group-hover:text-white transition-colors">${post.post_text}</div>
                </div>
            `).join('');
        }

        function selectPost(post) {
            window.currentPostId = post.id;
            document.getElementById('currentPostContent').innerText = post.post_text;
            document.getElementById('userNotes').value = post.user_notes || '';
            
            const diagnosisBox = document.getElementById('aiDiagnosis');
            if (post.ai_diagnosis) {
                diagnosisBox.innerHTML = `
                    <div class="mb-4 text-[10px] text-blue-500 font-mono uppercase tracking-widest border-b border-blue-900/30 pb-1">AI STRATEGIC REPORT [${post.diagnosis_provider}]</div>
                    <div class="text-gray-200 leading-loose whitespace-pre-wrap text-[15px]">${post.ai_diagnosis}</div>
                `;
            } else {
                diagnosisBox.innerHTML = '<div class="text-gray-500 italic">尚未發動分析...</div>';
            }
        }

        async function sendTask(type, provider = '') {
            if (type === 'ai_analyze' && !window.currentPostId) return alert('請先選擇一篇貼文！');
            const keyword = document.getElementById('keywordInput').value;
            const { error } = await supabase.from('scrape_tasks').insert({
                task_type: type,
                target_keyword: keyword || (provider === 'Claude' ? 'Claude' : ''),
                target_post_id: window.currentPostId,
                status: 'pending'
            });
            if (!error) alert(type === 'ai_analyze' ? '🚀 診斷指令已發送至哨兵...' : '📡 偵查指令已發送...');
        }

        async function saveNotes() {
            if (!window.currentPostId) return;
            const notes = document.getElementById('userNotes').value;
            await supabase.from('threads_posts').update({ user_notes: notes }).eq('id', window.currentPostId);
            alert('✅ 老師的觀點已存入資料庫。');
        }

        // 啟動與即時更新
        loadPosts();
        supabase.channel('posts_update').on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'threads_posts' }, loadPosts).subscribe();
    </script>
</body>
</html>
