<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶曜文化｜Threads 作戰指揮中心</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
</script>
<style>
  :root { 
    --bg:#0f0f13; --card:#1a1a24; --card2:#22222f; --accent:#c9a96e; 
    --text:#e8e4dc; --muted:#666; --green:#2ecc71; --red:#e74c3c; 
    --border:#2e2e40; --claude:#d97757; --insight:#7c6af5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, "Microsoft JhengHei", sans-serif; }
  body { background: var(--bg); color: var(--text); overflow-x: hidden; }
  
  /* HEADER */
  .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 32px; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  .header h2 { font-size: 16px; letter-spacing: 0.05em; color: var(--accent); }
  .budget-meter { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); padding: 6px 16px; border-radius: 50px; border: 1px solid var(--border); cursor: pointer; }
  .budget-bar { width: 80px; height: 5px; background: #222; border-radius: 3px; overflow: hidden; }
  .budget-fill { height: 100%; background: var(--green); transition: 0.3s; }
  .budget-text { font-size: 12px; font-weight: bold; color: var(--accent); }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin: 24px 32px 0; border-bottom: 1px solid var(--border); }
  .tab-btn { background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--muted); font-size: 14px; font-weight: 600; cursor: pointer; padding: 10px 20px; margin-bottom: -1px; transition: 0.2s; letter-spacing: 0.03em; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* PANELS */
  .panel { display: none; padding: 28px 32px; animation: fadeIn 0.25s ease-in; }
  .panel.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* BUTTONS */
  .btn { padding: 9px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; border: 1px solid var(--border); transition: 0.15s; letter-spacing: 0.02em; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #0f0f13; border: none; }
  .btn-sync { background: #6366f1; color: white; border: none; }
  .btn-insight { background: var(--insight); color: white; border: none; }
  .btn-danger { background: var(--red); color: white; border: none; }

  /* MARKET POSTS */
  .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; overflow: hidden; min-height: 300px; }
  .post-left { padding: 22px; border-right: 1px solid var(--border); }
  .post-right { padding: 22px; background: rgba(255,255,255,0.01); display: flex; flex-direction: column; gap: 10px; }
  .diagnosis-box { flex: 1; background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.7; color: #aaa; overflow-y: auto; min-height: 120px; }
  .stat-row { display: flex; gap: 12px; font-size: 12px; color: var(--muted); background: rgba(0,0,0,0.2); padding: 9px 12px; border-radius: 7px; margin-top: 12px; }

  /* INSIGHT PANEL */
  .insight-entry { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 28px; margin-bottom: 20px; }
  .insight-url-bar { display: flex; gap: 10px; margin-bottom: 28px; }
  .url-input { flex: 1; padding: 13px 18px; background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 9px; font-size: 14px; outline: none; transition: 0.2s; }
  .url-input:focus { border-color: var(--accent); }
  .insight-card { background: var(--card2); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; margin-bottom: 14px; transition: 0.2s; }
  .insight-card:hover { border-color: var(--insight); }
  .insight-status { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
  .status-completed { background: rgba(46,204,113,0.15); color: var(--green); }
  .status-pending { background: rgba(201,169,110,0.15); color: var(--accent); }
  .status-failed { background: rgba(231,76,60,0.15); color: var(--red); }
  .insight-result { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .insight-block { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 14px; }
  .insight-block h5 { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .insight-block p { font-size: 13px; line-height: 1.6; color: var(--text); }
  .insight-block ul { padding-left: 16px; }
  .insight-block ul li { font-size: 13px; line-height: 1.7; color: #bbb; }
  .insight-next { grid-column: 1 / -1; background: rgba(124,106,245,0.1); border: 1px solid rgba(124,106,245,0.3); border-radius: 8px; padding: 14px; }
  .insight-next h5 { font-size: 11px; color: var(--insight); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .insight-next p { font-size: 14px; line-height: 1.6; color: var(--text); font-weight: 500; }

  /* LAB PANEL */
  .lab-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .lab-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .lab-card h3 { font-size: 15px; color: var(--accent); display: flex; align-items: center; gap: 8px; }
  .lab-textarea { width: 100%; min-height: 160px; background: var(--card2); border: 1px solid var(--border); color: var(--text); padding: 14px; border-radius: 9px; font-size: 13px; line-height: 1.7; resize: vertical; outline: none; font-family: inherit; transition: 0.2s; }
  .lab-textarea:focus { border-color: var(--accent); }
  .lab-result { background: rgba(0,0,0,0.25); border: 1px solid var(--border); border-radius: 9px; padding: 16px; font-size: 13px; line-height: 1.7; color: #bbb; min-height: 100px; }
  .lab-predict-result { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 4px; }
  .predict-box { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; text-align: center; }
  .predict-box .val { font-size: 22px; font-weight: 700; color: var(--accent); }
  .predict-box .lbl { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .kw-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .kw-chip { background: rgba(124,106,245,0.15); border: 1px solid rgba(124,106,245,0.3); color: #b8b0ff; padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; transition: 0.15s; }
  .kw-chip:hover, .kw-chip.selected { background: var(--insight); color: white; border-color: var(--insight); }

  /* DRAWER */
  .notice { position: fixed; bottom: 20px; right: 20px; padding: 14px 24px; background: var(--accent); color: var(--bg); border-radius: 9px; font-weight: bold; font-size: 14px; z-index: 1000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .drawer { position: fixed; right: -420px; top: 0; width: 420px; height: 100%; background: var(--card); border-left: 1px solid var(--border); transition: 0.3s; z-index: 100; padding: 30px; overflow-y: auto; }
  .drawer.open { right: 0; }
  .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; z-index: 90; }
  .drawer-overlay.open { display: block; }

  .loading-dots::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0%{content:'.'} 33%{content:'..'} 66%{content:'...'} }
</style>
</head>
<body>

<div id="notice" class="notice"></div>

<div class="header">
  <h2>寶曜文化 指揮中心</h2>
  <div class="budget-meter" onclick="toggleDrawer(true)">
    <span class="budget-text">API 耗能</span>
    <div class="budget-bar"><div id="budgetFill" class="budget-fill" style="width:0%"></div></div>
    <span id="budgetText" class="budget-text">$0.00 / --</span>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="btn btn-sync" onclick="triggerSystemUpdate()">🔄 同步本機</button>
    <button class="btn" style="background:var(--card2); color:white;" onclick="toggleDrawer(true)">⚙️ 設定</button>
  </div>
</div>

<div class="tabs">
  <button id="btn-market" class="tab-btn active" onclick="switchTab('market')">📊 市場爆文情報</button>
  <button id="btn-insight" class="tab-btn" onclick="switchTab('insight')">🔬 留言洞察</button>
  <button id="btn-lab" class="tab-btn" onclick="switchTab('lab')">✍️ 貼文實驗室</button>
</div>

<!-- ── 市場爆文情報 ── -->
<div id="panel-market" class="panel active">
  <div id="marketPosts"></div>
</div>

<!-- ── 留言洞察 ── -->
<div id="panel-insight" class="panel">
  <div class="insight-entry">
    <h3 style="color:var(--accent); margin-bottom:8px;">🔍 投放偵查網址</h3>
    <p style="color:var(--muted); font-size:13px; margin-bottom:20px;">貼上 Threads 貼文網址，系統將自動抓取熱門留言並進行基因拆解。</p>
    <div class="insight-url-bar">
      <input type="text" id="targetUrl" class="url-input" placeholder="https://www.threads.com/@user/post/...">
      <button class="btn btn-insight" onclick="injectTask()">啟動偵查</button>
    </div>
  </div>
  <div id="insightList"></div>
</div>

<!-- ── 貼文實驗室 ── -->
<div id="panel-lab" class="panel">

  <!-- 生成區 -->
  <div class="lab-card" style="margin-bottom:20px;">
    <h3>🎯 草稿生成器</h3>
    <p style="font-size:13px; color:var(--muted);">選擇關鍵字或自行輸入，AI 依照大寶老師風格生成貼文草稿。</p>
    <div>
      <div style="font-size:12px; color:var(--muted); margin-bottom:8px;">從近期洞察快速帶入關鍵字：</div>
      <div id="kwChips" class="kw-chips"></div>
    </div>
    <input type="text" id="labKeyword" class="url-input" placeholder="或直接輸入關鍵字，例如：感情、財運、命格..." style="font-size:13px;">
    <button class="btn btn-primary" onclick="generateDraft()" style="align-self:flex-start;">✨ 生成草稿</button>
    <div id="draftResult" class="lab-result" style="display:none;"></div>
    <div style="display:none; justify-content:flex-end; gap:8px;" id="draftActions">
      <button class="btn" style="background:var(--card2); color:white;" onclick="copyDraft()">📋 複製草稿</button>
      <button class="btn btn-primary" onclick="sendDraftToPredict()">→ 送去預測</button>
    </div>
  </div>

  <!-- 預測區 -->
  <div class="lab-card">
    <h3>📈 成效預測器</h3>
    <p style="font-size:13px; color:var(--muted);">貼入草稿，AI 預估發文後的讚數、瀏覽量，並給出優化建議。</p>
    <textarea id="predictInput" class="lab-textarea" placeholder="貼入你的草稿文章..."></textarea>
    <button class="btn btn-primary" onclick="predictPost()" style="align-self:flex-start;">🔮 預測成效</button>
    <div id="predictResult" style="display:none;">
      <div class="lab-predict-result" id="predictNumbers"></div>
      <div class="lab-result" id="predictAdvice" style="margin-top:12px;"></div>
    </div>
  </div>

</div>

<!-- ── 設定抽屜 ── -->
<div class="drawer-overlay" id="overlay" onclick="toggleDrawer(false)"></div>
<div class="drawer" id="drawer">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:28px;">
    <h3 style="font-size:15px;">⚙️ 系統參數設定</h3>
    <button onclick="toggleDrawer(false)" style="border:none; background:transparent; color:white; cursor:pointer; font-size:20px; line-height:1;">✕</button>
  </div>
  <div style="margin-bottom:24px; padding:18px; background:rgba(0,0,0,0.2); border-radius:10px; border:1px solid var(--border);">
    <label style="font-size:12px; color:var(--muted);">每日預算上限 (USD)</label>
    <div style="display:flex; gap:10px; margin-top:10px;">
      <input type="number" id="budgetLimitInput" step="0.5" style="flex:1; padding:10px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:6px; outline:none; font-size:14px;">
      <button class="btn btn-primary" onclick="updateBudgetLimit()">更新</button>
    </div>
  </div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ── 工具函數 ──
function showMsg(msg) { 
  const n = document.getElementById('notice'); 
  n.innerText = msg; n.style.display = 'block'; 
  setTimeout(()=>n.style.display='none', 4000); 
}
function toggleDrawer(open) { 
  document.getElementById('drawer').classList.toggle('open', open); 
  document.getElementById('overlay').classList.toggle('open', open); 
  if(open) refreshBudget();
}
function nF(n) { 
  if(!n) return '0';
  let val = parseFloat(String(n).replace(/,/g, ''));
  return val >= 10000 ? (val/10000).toFixed(1) + ' 萬' : val.toLocaleString();
}
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById(`btn-${tab}`).classList.add('active');
  if(tab === 'market') loadMarketPosts();
  if(tab === 'insight') loadInsights();
  if(tab === 'lab') loadLabKeywords();
}

// ── 預算 ──
async function refreshBudget() {
  const { data: set } = await sb.from('system_settings').select('value_numeric').eq('key', 'daily_budget_limit').single();
  const limit = set?.value_numeric || 5.0;
  document.getElementById('budgetLimitInput').value = limit;
  const today = new Date().toISOString().split('T')[0];
  const { data: logs } = await sb.from('api_usage_logs').select('estimated_cost').gte('created_at', `${today}T00:00:00Z`);
  const spent = logs ? logs.reduce((sum,l) => sum+(Number(l.estimated_cost)||0), 0) : 0;
  const pct = Math.min((spent/limit)*100, 100);
  document.getElementById('budgetFill').style.width = `${pct}%`;
  document.getElementById('budgetFill').style.background = pct > 90 ? 'var(--red)' : 'var(--green)';
  document.getElementById('budgetText').innerText = `$${spent.toFixed(2)} / $${limit.toFixed(0)}`;
}
async function updateBudgetLimit() {
  const val = document.getElementById('budgetLimitInput').value;
  await sb.from('system_settings').update({ value_numeric: parseFloat(val) }).eq('key', 'daily_budget_limit');
  showMsg('✅ 預算已更新'); refreshBudget();
}

// ── 市場爆文情報 ──
async function loadMarketPosts() {
  const container = document.getElementById('marketPosts');
  container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted);">⏳ 讀取中...</div>`;
  const { data: posts } = await sb.from('threads_posts').select('*').order('scraped_at', { ascending: false }).limit(50);
  if (!posts || posts.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:50px; color:var(--muted);">📭 尚無資料</div>`; return;
  }
  container.innerHTML = posts.map(p => {
    const user = p.username.startsWith('@') ? p.username : '@'+p.username;
    return `
    <div class="post-card">
      <div class="post-left">
        <div style="color:var(--muted); font-size:12px; margin-bottom:12px;">
          <strong style="color:var(--accent)">${user}</strong> <span>${p.post_time?.split('T')[0]||''}</span>
        </div>
        <p style="font-size:14px; line-height:1.65; color:#ddd; white-space:pre-wrap;">${p.post_text}</p>
        <div class="stat-row">
          <span>👀 ${nF(p.views)}</span><span>❤️ ${nF(p.likes)}</span><span>💬 ${nF(p.comments)}</span>
        </div>
      </div>
      <div class="post-right">
        <textarea style="width:100%; background:var(--bg); border:1px solid var(--border); color:white; padding:10px; border-radius:8px; font-size:12px; resize:none; outline:none; font-family:inherit;" rows="3" placeholder="筆記..." onblur="updateNote('${p.id}', this.value)">${p.user_notes||''}</textarea>
        <div class="diagnosis-box" id="diag-${p.id}">${p.ai_diagnosis||'🔍 尚未分析'}</div>
        <div style="display:flex; gap:8px;">
          <button class="btn" style="background:var(--claude); color:white; border:none; flex:1; font-size:13px;" onclick="analyzePost('${p.id}')">Claude 診斷</button>
          <button class="btn btn-danger" onclick="delPost('${p.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}
async function delPost(id) { if(confirm('確定刪除？')) { await sb.from('threads_posts').delete().eq('id',id); loadMarketPosts(); } }
async function updateNote(postId, val) { await sb.from('threads_posts').update({ user_notes: val }).eq('id', postId); }
async function analyzePost(postId) {
  document.getElementById(`diag-${postId}`).innerHTML = `<span class="loading-dots">⏳ 診斷中</span>`;
  await sb.from('scrape_tasks').insert([{ task_type: 'ai_analyze', target_post_id: postId }]);
  showMsg('🚀 診斷已排程');
}

// ── 留言洞察 ──
async function injectTask() {
  const url = document.getElementById('targetUrl').value.trim();
  if(!url.includes('threads.net') && !url.includes('threads.com')) return alert('網址格式不正確');
  await sb.from('scrape_tasks').insert([{ task_type: 'analyze_viral', url, status: 'pending' }]);
  document.getElementById('targetUrl').value = '';
  showMsg('🚀 偵查任務已啟動');
  loadInsights();
}

async function loadInsights() {
  const container = document.getElementById('insightList');
  container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted);">⏳ 讀取中...</div>`;

  // 抓任務列表
  const { data: tasks } = await sb.from('scrape_tasks')
    .select('*').eq('task_type', 'analyze_viral')
    .order('created_at', { ascending: false }).limit(20);

  if (!tasks || tasks.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:40px; color:var(--muted);">📭 尚無偵查任務</div>`; return;
  }

  // 抓對應的 comment_insights
  const taskIds = tasks.map(t => t.id);
  const { data: insights } = await sb.from('comment_insights')
    .select('*').in('task_id', taskIds);

  const insightMap = {};
  (insights||[]).forEach(i => { insightMap[i.task_id] = i; });

  container.innerHTML = tasks.map(t => {
    const ins = insightMap[t.id];
    const result = t.task_result;
    const statusClass = `status-${t.status}`;
    const urlShort = t.url?.replace('https://www.threads.com/', '').replace('https://www.threads.net/', '').split('?')[0];

    let resultHtml = '';
    if (result && t.status === 'completed') {
      const curiosity = Array.isArray(result.curiosity_cluster) ? result.curiosity_cluster : [];
      const dispute = Array.isArray(result.dispute_cluster) ? result.dispute_cluster : [];
      resultHtml = `
        <div class="insight-result">
          <div class="insight-block">
            <h5>🧲 好奇組</h5>
            <ul>${curiosity.map(c => `<li>${c}</li>`).join('')}</ul>
          </div>
          <div class="insight-block">
            <h5>⚡ 爭議點</h5>
            <ul>${dispute.map(d => `<li>${d}</li>`).join('')}</ul>
          </div>
          <div class="insight-block" style="grid-column:1/-1;">
            <h5>😰 核心焦慮</h5>
            <p>${result.core_anxiety || '—'}</p>
          </div>
          <div class="insight-next">
            <h5>✍️ 建議大寶老師下一篇</h5>
            <p>${result.dabao_next_post || '—'}</p>
          </div>
        </div>`;
    }

    return `
    <div class="insight-card">
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px;">
        <a href="${t.url}" target="_blank" style="color:var(--accent); font-size:13px; text-decoration:none; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">🔗 ${urlShort}</a>
        <div style="display:flex; align-items:center; gap:10px; flex-shrink:0;">
          ${ins ? `<span style="font-size:12px; color:var(--muted);">留言 ${ins.total_comments} 則</span>` : ''}
          <span class="insight-status ${statusClass}">${t.status.toUpperCase()}</span>
          <span style="font-size:11px; color:var(--muted);">${t.created_at?.split('T')[0]||''}</span>
        </div>
      </div>
      ${resultHtml}
    </div>`;
  }).join('');
}

// ── 貼文實驗室：關鍵字 ──
async function loadLabKeywords() {
  // 從最近的留言洞察裡抽取好奇組作為快速關鍵字
  const { data: tasks } = await sb.from('scrape_tasks')
    .select('task_result').eq('task_type', 'analyze_viral').eq('status', 'completed')
    .order('created_at', { ascending: false }).limit(5);

  const kwSet = new Set();
  (tasks||[]).forEach(t => {
    const c = t.task_result?.curiosity_cluster;
    if (Array.isArray(c)) c.forEach(kw => { if(kw) kwSet.add(kw); });
  });

  const chips = document.getElementById('kwChips');
  if (kwSet.size === 0) { chips.innerHTML = `<span style="font-size:12px; color:var(--muted);">尚無近期洞察資料</span>`; return; }
  chips.innerHTML = [...kwSet].slice(0, 10).map(kw =>
    `<span class="kw-chip" onclick="selectKw(this, '${kw.replace(/'/g,"\\'")}')">🏷 ${kw}</span>`
  ).join('');
}

function selectKw(el, kw) {
  document.querySelectorAll('.kw-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('labKeyword').value = kw;
}

// ── 貼文實驗室：生成草稿 ──
async function generateDraft() {
  const kw = document.getElementById('labKeyword').value.trim();
  if (!kw) return alert('請先輸入或選擇關鍵字');
  
  const btn = event.target;
  btn.disabled = true; btn.textContent = '生成中...';
  
  const draftResult = document.getElementById('draftResult');
  const draftActions = document.getElementById('draftActions');
  draftResult.style.display = 'block';
  draftResult.innerHTML = `<span class="loading-dots">AI 構思中</span>`;
  draftActions.style.display = 'none';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `你是大寶老師的貼文代筆助手。大寶老師是台灣知名紫微斗數命理師，Threads 帳號 @read_urface，追蹤者近萬，超過八成為女性（20～50歲）。

寫作風格規則：
- 對話驅動，不敘述驅動
- 沒有人說完整的句子，搶話、確認、驚喜
- 身體反應夾在話語之間，不在話語之後
- 絕不提宮位、星曜、大限等術語
- 故事要有命理師「引路人」的視角，不沉浸在客戶情緒裡
- 第一段製造懸念，結尾加「（留言續...）」
- 500字以內，適量 emoji，不過多`,
        messages: [{ role: 'user', content: `請以「${kw}」為主題，生成一篇大寶老師風格的 Threads 貼文（第一則，製造懸念，結尾留言續）。` }]
      })
    });
    const data = await response.json();
    const text = data.content?.[0]?.text || '生成失敗，請重試';
    draftResult.innerText = text;
    draftActions.style.display = 'flex';
  } catch(e) {
    draftResult.innerHTML = `<span style="color:var(--red);">❌ 生成失敗：${e.message}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = '✨ 生成草稿';
  }
}

function copyDraft() {
  const text = document.getElementById('draftResult').innerText;
  navigator.clipboard.writeText(text).then(() => showMsg('📋 已複製到剪貼簿'));
}

function sendDraftToPredict() {
  const text = document.getElementById('draftResult').innerText;
  document.getElementById('predictInput').value = text;
  document.getElementById('predictInput').scrollIntoView({ behavior: 'smooth' });
  showMsg('✅ 已帶入預測區');
}

// ── 貼文實驗室：成效預測 ──
async function predictPost() {
  const content = document.getElementById('predictInput').value.trim();
  if (!content) return alert('請先輸入草稿內容');

  const btn = event.target;
  btn.disabled = true; btn.textContent = '預測中...';

  const resultBox = document.getElementById('predictResult');
  const numbersBox = document.getElementById('predictNumbers');
  const adviceBox = document.getElementById('predictAdvice');
  resultBox.style.display = 'block';
  numbersBox.innerHTML = '';
  adviceBox.innerHTML = `<span class="loading-dots">AI 分析中</span>`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `你是一位 Threads 社群數據分析師，專門分析台灣命理師帳號的貼文成效。
根據貼文內容，預測發文後的成效數據，並給出具體優化建議。
嚴格規則：只回傳 JSON，不加任何說明文字或 markdown。
格式：{"likes":"預估讚數（如：800～1200）","views":"預估瀏覽量（如：1.5萬～3萬）","share_rate":"預估轉發率（如：中等）","score":85,"advice":"具體優化建議，150字以內，指出最強的鉤子在哪裡、哪裡可以再加強懸念、結尾是否夠強"}`,
        messages: [{ role: 'user', content: `請分析這篇貼文的預估成效：\n\n${content}` }]
      })
    });
    const data = await response.json();
    const raw = data.content?.[0]?.text || '{}';
    const clean = raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/i,'').trim();
    const result = JSON.parse(clean);

    numbersBox.innerHTML = `
      <div class="predict-box"><div class="val">${result.likes||'—'}</div><div class="lbl">預估讚數</div></div>
      <div class="predict-box"><div class="val">${result.views||'—'}</div><div class="lbl">預估瀏覽量</div></div>
      <div class="predict-box"><div class="val">${result.score||'—'}</div><div class="lbl">爆火潛力分</div></div>`;
    adviceBox.innerHTML = `<strong style="color:var(--accent); font-size:12px; display:block; margin-bottom:8px;">🔧 優化建議</strong>${result.advice||'—'}`;
  } catch(e) {
    adviceBox.innerHTML = `<span style="color:var(--red);">❌ 預測失敗：${e.message}</span>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔮 預測成效';
  }
}

// ── 系統更新 ──
async function triggerSystemUpdate() {
  if(!confirm('這將強制本機電腦同步 GitHub 並重啟，確定執行？')) return;
  await sb.from('scrape_tasks').insert([{ task_type: 'system_update', status: 'pending' }]);
  showMsg('⏳ 雲端同步指令已派發');
}

// ── 關鍵字管理 ──
function renderKeywordCard(kw) {
  const isMust = kw.type === 'must';
  const isActive = kw.status === 'active';
  const result = kw.last_result || {};
  return `
  <div style="background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <span style="font-size:15px; font-weight:600;">${kw.keyword}</span>
      <div style="display:flex; gap:6px; align-items:center;">
        <span style="font-size:11px; padding:3px 8px; border-radius:20px; background:${isMust ? 'rgba(201,169,110,0.15)' : 'rgba(124,106,245,0.15)'}; color:${isMust ? 'var(--accent)' : '#b8b0ff'};">${isMust ? '必抓' : '試抓'}</span>
        <button onclick="toggleKeyword('${kw.id}', '${kw.status}')" style="padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; border:none; cursor:pointer; background:${isActive ? 'rgba(46,204,113,0.15)' : 'rgba(100,100,100,0.15)'}; color:${isActive ? 'var(--green)' : 'var(--muted)'};">${isActive ? '啟用中' : '已停用'}</button>
      </div>
    </div>
    ${kw.last_scraped_at ? `<div style="font-size:11px; color:var(--muted); margin-bottom:8px;">上次抓取：${kw.last_scraped_at.split('T')[0]} | 共 ${kw.post_count || 0} 篇</div>` : ''}
    ${result.max_likes ? `<div style="font-size:11px; color:var(--muted); margin-bottom:8px;">最高讚：${result.max_likes} | 最高留言：${result.max_comments || 0}</div>` : ''}
    <div style="display:flex; gap:6px;">
      <button class="btn btn-insight" onclick="triggerKeyword('${kw.keyword}')" style="font-size:12px; padding:6px 14px;">▶ 立即抓取</button>
      <button class="btn" onclick="changeKwType('${kw.id}', '${isMust ? 'trial' : 'must'}')" style="font-size:12px; padding:6px 14px; background:var(--card); color:var(--text);">→ 移至${isMust ? '試抓' : '必抓'}</button>
      <button class="btn btn-danger" onclick="deleteKeyword('${kw.id}')" style="font-size:12px; padding:6px 14px;">刪除</button>
    </div>
  </div>`;
}
async function loadKeywords() {
  const { data } = await sb.from('keywords').select('*').order('created_at', { ascending: false });
  const must = (data||[]).filter(k => k.type === 'must');
  const trial = (data||[]).filter(k => k.type === 'trial');
  document.getElementById('mustKeywords').innerHTML = must.length ? must.map(renderKeywordCard).join('') : '<div style="color:var(--muted); font-size:13px; padding:20px 0;">尚無必抓關鍵字</div>';
  document.getElementById('trialKeywords').innerHTML = trial.length ? trial.map(renderKeywordCard).join('') : '<div style="color:var(--muted); font-size:13px; padding:20px 0;">尚無試抓關鍵字</div>';
  document.getElementById('nextSchedule').innerText = nextScheduleTime();
}
async function addKeyword() {
  const kw = document.getElementById('newKw').value.trim();
  const type = document.getElementById('kwType').value;
  if (!kw) return alert('請輸入關鍵字');
  await sb.from('keywords').insert([{ keyword: kw, type, status: 'active' }]);
  document.getElementById('newKw').value = '';
  showMsg('✅ 關鍵字已新增');
  loadKeywords();
}
async function deleteKeyword(id) {
  if (!confirm('確定刪除此關鍵字？')) return;
  await sb.from('keywords').delete().eq('id', id);
  showMsg('Ὕ1️ 已刪除');
  loadKeywords();
}
async function toggleKeyword(id, current) {
  await sb.from('keywords').update({ status: current === 'active' ? 'paused' : 'active' }).eq('id', id);
  loadKeywords();
}
async function changeKwType(id, newType) {
  await sb.from('keywords').update({ type: newType }).eq('id', id);
  showMsg(`✅ 已移至${newType === 'must' ? '必抓' : '試抓'}`);
  loadKeywords();
}
async function triggerKeyword(keyword) {
  await sb.from('scrape_tasks').insert([{ task_type: 'search', target_keyword: keyword, status: 'pending' }]);
  showMsg(`Ὠ0 已觸發抓取：${keyword}`);
}
function nextScheduleTime() {
  const now = new Date();
  const schedules = [6, 14, 20];
  const nowHour = now.getHours() + now.getMinutes() / 60;
  const next = schedules.find(h => h > nowHour) ?? schedules[0];
  return `${String(next).padStart(2,'0')}:00`;
}
// ── 初始化 ──
refreshBudget();
setInterval(refreshBudget, 30000);
loadMarketPosts();
</script>
