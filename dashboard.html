<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Threads 命理情報站</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
(async function checkAuth() { const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); const { data: { session } } = await sb.auth.getSession(); if (!session && !sessionStorage.getItem('dabao_auth')) window.location.href = 'index.html'; })();
</script>
<style>
  :root { --bg:#0f0f13; --card:#1a1a24; --card2:#22222f; --accent:#c9a96e; --text:#e8e4dc; --muted:#888; --green:#2ecc71; --red:#e74c3c; --border:#2e2e40; }
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
  body { background: var(--bg); color: var(--text); }
  .header { display: flex; justify-content: space-between; padding: 20px 32px; background: var(--card); border-bottom: 1px solid var(--border); }
  .tabs { display: flex; gap: 10px; margin: 20px 32px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
  .tab-btn { background: transparent; border: none; color: var(--muted); font-size: 16px; font-weight: bold; cursor: pointer; padding: 10px 20px; border-radius: 8px; }
  .tab-btn.active { color: var(--bg); background: var(--accent); }
  .panel { display: none; padding: 0 32px; }
  .panel.active { display: block; }
  .btn { padding: 8px 16px; background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 6px; cursor: pointer; }
  .btn-primary { background: var(--accent); color: var(--bg); border: none; font-weight: bold; }
  .btn-danger { color: var(--red); border-color: var(--red); background: transparent; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .kw-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; position: relative;}
  .post-card .meta { display: flex; gap: 10px; color: var(--muted); font-size: 13px; margin-bottom: 10px; }
  .ai-panel { background: #1f1b2c; border: 1px solid #3d2b6b; border-radius: 8px; padding: 15px; margin-top: 15px; }
  .ai-panel h4 { color: #b388ff; margin-bottom: 10px; font-size: 14px; }
  .ai-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .ai-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 6px; font-size: 13px; }
  .ai-box span { color: var(--muted); display: block; margin-bottom: 4px; font-size: 11px; }
  .notice { padding: 15px; background: var(--card2); margin: 0 32px 20px; border-left: 4px solid var(--accent); display: none; }
  
  /* 捲軸美化設定 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<div class="header">
  <h2>Threads 作戰指揮中心</h2>
  <div><button class="btn btn-primary" onclick="triggerTask('full')">⚡ 全域抓取</button></div>
</div>

<div id="notice" class="notice"></div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('market')" id="btn-market">📊 市場爆文情報</button>
  <button class="tab-btn" onclick="switchTab('myposts')" id="btn-myposts">👤 我的專屬覆盤 (AI)</button>
</div>

<div id="panel-market" class="panel active">
  <div class="grid-2">
    <div class="card">
      <h3>🔍 關鍵字管理</h3>
      <div style="margin: 15px 0; display:flex; gap:10px;">
        <input type="text" id="newKw" placeholder="輸入新關鍵字..." style="flex:1; padding:8px; background:var(--bg); border:1px solid var(--border); color:white; border-radius:6px;">
        <button class="btn" onclick="addKeyword()">加入排程</button>
        <button class="btn" onclick="testKeyword()" style="color:var(--accent); border-color:var(--accent);">🚀 72H 潛力探測</button>
      </div>
      
      <div id="radarBox" style="display:none; background:rgba(201,169,110,0.1); border:1px solid var(--accent); padding:15px; border-radius:8px; margin-bottom:15px;">
        <h4 style="color:var(--accent); margin-bottom:10px; font-size:14px;">📡 [<span id="radarKw"></span>] 72小時市場戰情報告</h4>
        <div style="display:flex; justify-content:space-around; text-align:center;">
          <div><div style="font-size:20px; font-weight:bold; color:#fff;" id="radarTotal">0</div><div style="font-size:12px; color:var(--muted);">總聲量(篇)</div></div>
          <div><div style="font-size:20px; font-weight:bold; color:#2ecc71;" id="radarViews">0</div><div style="font-size:12px; color:var(--muted);">最高瀏覽</div></div>
          <div><div style="font-size:20px; font-weight:bold; color:#e74c3c;" id="radarLikes">0</div><div style="font-size:12px; color:var(--muted);">最高按讚</div></div>
        </div>
      </div>

      <div id="kwList"></div>
    </div>
  </div>
  <h3>🔥 最新市場爆文</h3>
  <div id="marketPosts"></div>
</div>

<div id="panel-myposts" class="panel">
  <h3>📝 我的貼文與 AI 診斷</h3>
  <div id="myPosts"></div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function showMsg(msg) { const n = document.getElementById('notice'); n.innerText = msg; n.style.display = 'block'; setTimeout(()=>n.style.display='none', 5000); }
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`panel-${tab}`).classList.add('active');
  document.getElementById(`btn-${tab}`).classList.add('active');
}
function esc(str) { return (str||'').replace(/</g,'&lt;'); }

// 數字格式化工具 (用於雷達顯示)
function formatNum(num) {
  if (!num) return '0';
  return num >= 10000 ? (num / 10000).toFixed(1) + '萬' : num.toLocaleString();
}

async function loadData() {
  // 載入關鍵字
  const { data: kws } = await sb.from('monitored_keywords').select('*').order('added_at', { ascending: false });
  document.getElementById('kwList').innerHTML = (kws||[]).map(k => `
    <div class="kw-row">
      <span style="color:${k.is_active?'var(--text)':'var(--muted)'}">${esc(k.keyword)}</span>
      <div>
        <button class="btn" style="font-size:11px;" onclick="toggleKw('${k.keyword}', ${!k.is_active})">${k.is_active?'暫停':'啟用'}</button>
      </div>
    </div>`).join('');

  // 載入貼文
  const { data: posts } = await sb.from('threads_posts').select('*').order('post_time', { ascending: false }).limit(100);
  const market = posts.filter(p => p.keyword !== '__my_posts__');
  const myPosts = posts.filter(p => p.keyword === '__my_posts__');

  const renderPost = (p, isMine) => `
    <div class="post-card">
      <div style="position:absolute; right:20px; top:20px; display:flex; gap:10px;">
        <a href="${p.post_url}" target="_blank" class="btn" style="text-decoration:none; font-size:12px;">🔗 開啟</a>
        <button class="btn btn-danger" style="font-size:12px;" onclick="delPost('${p.id}')">🗑️</button>
      </div>
      <div class="meta">
        <strong style="color:var(--accent)">@${esc(p.username)}</strong>
        <span style="background:var(--card2); padding:2px 6px; border-radius:4px;">${esc(p.keyword)}</span>
        <span>${p.post_time ? p.post_time.split('T')[0] : '未知時間'}</span>
        ${p.is_viral ? '<span style="color:var(--red);">🔥 爆文</span>' : ''}
        ${p.is_test ? '<span style="color:var(--green);">🧪 試抓</span>' : ''}
      </div>
      <p style="white-space:pre-wrap; font-size:14px; line-height:1.6; color:#ccc; max-height: 350px; overflow-y: auto; padding-right: 10px;">${esc(p.post_text)}</p>
      <div style="margin-top:12px; font-size:13px;">👀 ${p.views||0} ｜ ❤️ ${p.likes||0} ｜ 💬 ${p.comments||0}</div>
      ${isMine ? `
      <div class="ai-panel">
        <h4>🤖 AI 爆文深度診斷</h4>
        <div class="ai-grid">
          <div class="ai-box"><span>🎯 核心主題</span>等待串接 AI 解析...</div>
          <div class="ai-box"><span>🔥 鉤子結構</span>等待串接 AI 解析...</div>
          <div class="ai-box" style="grid-column: span 2;"><span>💡 優化建議</span>下個階段即可在此看見自動分析！</div>
        </div>
      </div>` : ''}
    </div>`;

  document.getElementById('marketPosts').innerHTML = market.map(p => renderPost(p, false)).join('');
  document.getElementById('myPosts').innerHTML = myPosts.map(p => renderPost(p, true)).join('');
}

async function addKeyword() {
  const kw = document.getElementById('newKw').value.trim(); if(!kw) return;
  await sb.from('monitored_keywords').insert([{ keyword: kw }]); loadData(); document.getElementById('newKw').value = '';
}
async function toggleKw(kw, active) { await sb.from('monitored_keywords').update({ is_active: active }).eq('keyword', kw); loadData(); }
async function delPost(id) { await sb.from('threads_posts').delete().eq('id', id); loadData(); }

// 升級版：72小時市場探測觸發
async function testKeyword() {
  const kw = document.getElementById('newKw').value.trim(); if(!kw) return alert('請先輸入關鍵字');
  
  // 先顯示雷達面板並呈現載入中
  document.getElementById('radarKw').innerText = esc(kw);
  document.getElementById('radarTotal').innerText = '...';
  document.getElementById('radarViews').innerText = '...';
  document.getElementById('radarLikes').innerText = '...';
  document.getElementById('radarBox').style.display = 'block';

  triggerTask('test_search', kw);
}

// 雷達結算功能：只抓取72小時內的資料
async function calculateRadar(kw) {
  const { data: posts } = await sb.from('threads_posts').select('*').eq('keyword', kw);
  if (!posts) return;
  
  // 計算 72 小時前的時間點
  const limitTime = new Date(Date.now() - 72 * 60 * 60 * 1000).toISOString();
  
  // 只篩選 72 小時內的文章
  const validPosts = posts.filter(p => p.post_time && p.post_time >= limitTime);
  
  const total = validPosts.length;
  const maxViews = total > 0 ? Math.max(...validPosts.map(p => p.views || 0)) : 0;
  const maxLikes = total > 0 ? Math.max(...validPosts.map(p => p.likes || 0)) : 0;
  
  document.getElementById('radarTotal').innerText = total;
  document.getElementById('radarViews').innerText = formatNum(maxViews);
  document.getElementById('radarLikes').innerText = formatNum(maxLikes);
}

// 呼叫哨兵 (加入雷達連動)
async function triggerTask(type, kw = null) {
  showMsg('⏳ 傳送指令至家中主機...');
  const { data: task } = await sb.from('scrape_tasks').insert([{ task_type: type, target_keyword: kw }]).select().single();
  
  const channel = sb.channel('task-'+task.id).on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'scrape_tasks', filter: `id=eq.${task.id}` }, async (p) => {
    if (p.new.status === 'processing') showMsg('⚡ 家中主機已喚醒，正在探測中...');
    else if (p.new.status === 'failed_busy') { showMsg('⛔ 主機回報：有其他任務正在執行，請稍後。'); sb.removeChannel(channel); }
    else if (p.new.status === 'completed') { 
      showMsg('✅ 任務完成！刷新戰報...'); 
      await loadData(); 
      // 如果是探測任務，在完成後結算 72 小時雷達數據
      if (type === 'test_search' && kw) {
        await calculateRadar(kw);
      }
      sb.removeChannel(channel); 
    }
  }).subscribe();
}

loadData();
</script>
</body>
</html>
