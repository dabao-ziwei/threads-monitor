<html lang="zh-TW">

<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ── 驗證保護 ────────────────────────────────────────────────
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';

(async function checkAuth() {
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  const { data: { session } } = await sb.auth.getSession();
  if (session) return;
  const auth = sessionStorage.getItem('dabao_auth');
  if (auth) {
    const a = JSON.parse(auth);
    if (Date.now() - a.verified_at < 8 * 60 * 60 * 1000) return;
  }
  window.location.href = 'index.html';
})();
</script>
<style>
  :root {
    --bg: #0f0f13;
    --card: #1a1a24;
    --card2: #22222f;
    --accent: #c9a96e;
    --accent2: #9b59b6;
    --text: #e8e4dc;
    --muted: #888;
    --green: #2ecc71;
    --red: #e74c3c;
    --border: #2e2e40;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, 'Noto Sans TC', sans-serif; min-height: 100vh; }

  .header {
    background: linear-gradient(135deg, #1a1a24 0%, #0f0f13 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header h1 { font-size: 20px; color: var(--accent); letter-spacing: 1px; }
  .header .subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .last-update { font-size: 12px; color: var(--muted); text-align: right; }
  .last-update strong { color: var(--accent); }

  /* 手動抓取按鈕 */
  .scrape-btn {
    padding: 8px 18px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #1a1200;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .scrape-btn:hover:not(:disabled) { background: #d4b57a; transform: translateY(-1px); }
  .scrape-btn:disabled { opacity: 0.6; cursor: default; transform: none; }
  .scrape-btn.loading { background: var(--card2); color: var(--muted); border: 1px solid var(--border); }

  .logout-link { font-size: 12px; color: var(--muted); cursor: pointer; }
  .logout-link:hover { color: var(--text); }

  .container { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* 通知列 */
  .notice {
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .notice.show { display: flex; align-items: center; gap: 10px; }
  .notice.info { background: rgba(201,169,110,0.1); border: 1px solid rgba(201,169,110,0.3); color: var(--accent); }
  .notice.success { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); color: var(--green); }
  .notice.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: var(--red); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 14px; height: 14px; border: 2px solid rgba(201,169,110,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }

  /* 數字卡 */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .stat-card .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-card .value { font-size: 28px; font-weight: 700; color: var(--accent); margin: 8px 0 4px; }
  .stat-card .sub { font-size: 12px; color: var(--muted); }

  /* 兩欄 */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
  .section-title { font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }

  /* 關鍵字熱度 */
  .keyword-bar { margin-bottom: 10px; }
  .keyword-bar .klabel { font-size: 13px; display: flex; justify-content: space-between; margin-bottom: 4px; }
  .keyword-bar .klabel span { color: var(--muted); font-size: 12px; }
  .keyword-bar .bar-bg { background: var(--card2); border-radius: 4px; height: 8px; overflow: hidden; }
  .keyword-bar .bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, var(--accent2), var(--accent)); transition: width 0.6s ease; }

  /* 熱門話題 */
  .trend-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .trend-tag { display: inline-block; background: var(--card2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; margin: 3px; font-size: 12px; }
  .trend-tag.hot { border-color: var(--red); color: var(--red); }
  .trend-tag.warm { border-color: var(--accent); color: var(--accent); }
  .trend-tag.new { border-color: var(--green); color: var(--green); }

  /* 貼文卡 */
  .posts-section { margin-bottom: 28px; }
  .post-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px 22px; margin-bottom: 10px; position: relative; transition: border-color 0.2s; }
  .post-card:hover { border-color: var(--accent); }
  .post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .post-meta .username { color: var(--accent); font-weight: 600; font-size: 14px; }
  .post-meta .kw-tag { background: var(--card2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 11px; color: var(--muted); }
  .post-meta .time { font-size: 12px; color: var(--muted); }
  .post-text { font-size: 13px; line-height: 1.7; color: #ccc; white-space: pre-wrap; }

  /* 空狀態 */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  /* 洞察 */
  .insight-card { background: linear-gradient(135deg, #1e1830 0%, #1a1a24 100%); border: 1px solid #3d2b6b; border-radius: 12px; padding: 20px; margin-bottom: 10px; }
  .insight-card h3 { color: #b388ff; font-size: 14px; margin-bottom: 10px; }
  .insight-card p { font-size: 13px; line-height: 1.7; color: #ccc; }
  .insight-card .action { margin-top: 10px; padding: 10px 12px; background: rgba(155,89,182,0.15); border: 1px solid rgba(155,89,182,0.3); border-radius: 8px; font-size: 12px; color: #b388ff; }
  .insight-card .action strong { color: #e040fb; }

  .footer { text-align: center; padding: 20px; color: var(--muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 20px; }

  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .two-col { grid-template-columns: 1fr; }
    .container { padding: 16px; }
    .header { padding: 16px; flex-direction: column; align-items: flex-start; gap: 12px; }
  }

  /* Loading 骨架 */
  .skeleton { background: linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 6px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Threads 命理熱文監測站</h1>
    <div class="subtitle">@read_urface ｜ 寶曜文化</div>

  <div class="header-right">

<div class="container">

  <div class="notice" id="noticeBar"></div>

  <!-- 數字卡 -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="label">資料庫貼文總數</div>

  <!-- 洞察 -->
  <div class="two-col">

<script>
const SUPABASE_URL = 'https://uwktzlxlduqyjyoolgrs.supabase.co';
const SUPABASE_KEY  = 'sb_publishable_zd-hddZrWPl2uzLUJmouxw_U31_3PYa';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let isScraping = false;

// ── 通知列 ─────────────────────────────────────────────────
function showNotice(msg, type = 'info', duration = 0) {
  const el = document.getElementById('noticeBar');
  const spinner = type === 'info' ? '<div class="spinner"></div>' : '';
  el.innerHTML = spinner + '<span>' + msg + '</span>';
  el.className = 'notice ' + type + ' show';
  if (duration > 0) setTimeout(() => el.className = 'notice', duration);
}
function hideNotice() { document.getElementById('noticeBar').className = 'notice'; }

// ── 從 Supabase 載入資料 ────────────────────────────────────
async function loadData() {
  // 1. 最新批次的貼文
  const { data: posts, error } = await sb
    .from('threads_posts')
    .select('*')
    .order('scraped_at', { ascending: false })
    .limit(60);

  if (error) {
    showNotice('載入失敗：' + error.message, 'error');
    document.getElementById('postsContainer').innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>無法連接資料庫<br><small>' + error.message + '</small></p></div>';
    return;
  }

  if (!posts || posts.length === 0) {
    renderEmpty();
    return;
  }

  // 2. 更新時間
  const latest = posts[0].scraped_at;
  const latestDate = new Date(latest);
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('lastUpdateTime').textContent =
    `${latestDate.getFullYear()}/${pad(latestDate.getMonth()+1)}/${pad(latestDate.getDate())} ${pad(latestDate.getHours())}:${pad(latestDate.getMinutes())}`;

  // 3. 最新批次（同 batch_id）
  const latestBatch = posts[0].batch_id;
  const batchPosts = posts.filter(p => p.batch_id === latestBatch);

  // 4. 統計
  const { count } = await sb.from('threads_posts').select('*', { count: 'exact', head: true });
  document.getElementById('statTotal').textContent = count || posts.length;
  document.getElementById('statBatch').textContent = batchPosts.length + ' 篇';

  // 5. 關鍵字統計
  const kwCount = {};
  batchPosts.forEach(p => { kwCount[p.keyword] = (kwCount[p.keyword] || 0) + 1; });
  const sortedKw = Object.entries(kwCount).sort((a,b) => b[1]-a[1]);
  if (sortedKw.length > 0) {
    document.getElementById('statTopKw').textContent = sortedKw[0][0];
    document.getElementById('statTopKwSub').textContent = sortedKw[0][1] + ' 篇（最新批次）';
  }

  renderKeywordBars(sortedKw, batchPosts.length);
  renderPosts(batchPosts.length > 0 ? batchPosts : posts.slice(0, 20));
  renderInsights(batchPosts.length > 0 ? batchPosts : posts.slice(0, 20));
  renderAccounts(posts);
  renderTrendTags(batchPosts.length > 0 ? batchPosts : posts.slice(0, 20));
}

// ── 渲染關鍵字熱度 ─────────────────────────────────────────
function renderKeywordBars(sortedKw, total) {
  const container = document.getElementById('keywordBars');
  if (sortedKw.length === 0) { container.innerHTML = '<div style="color:var(--muted);font-size:13px;">尚無資料</div>'; return; }
  const max = sortedKw[0][1];
  container.innerHTML = sortedKw.map(([kw, count]) => `
    <div class="keyword-bar">
      <div class="klabel">${kw} <span>${count} 篇</span></div>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(count/max*100)}%"></div></div>
    </div>
  `).join('');
}

// ── 渲染熱門話題標籤 ───────────────────────────────────────
function renderTrendTags(posts) {
  // 從貼文文字中提取高頻詞
  const keywords = ['天機試煉場', 'AI算命', '夫妻宮', '感情運', '流年', '破軍', '排盤', '命理師', '預約', '算命推薦', '八字', '紫微', '情劫', '財運'];
  const found = [];
  const allText = posts.map(p => p.post_text || '').join(' ');
  keywords.forEach(kw => { if (allText.includes(kw)) found.push(kw); });

  const types = ['hot','hot','warm','warm','warm','new','new','','','','',''];
  document.getElementById('trendTags').innerHTML = found.length > 0
    ? found.map((kw, i) => `<span class="trend-tag ${types[i] || ''}">${kw}</span>`).join('')
    : '<div style="color:var(--muted);font-size:13px;">抓取資料後自動分析</div>';
}

// ── 渲染貼文 ───────────────────────────────────────────────
function renderPosts(posts) {
  const container = document.getElementById('postsContainer');
  if (!posts || posts.length === 0) { container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>還沒有資料<br>點上方「立即抓取新資料」開始</p></div>'; return; }

  container.innerHTML = posts.slice(0, 10).map((p, i) => {
    const t = p.post_time ? new Date(p.post_time) : null;
    const timeStr = t ? `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}` : '';
    const text = (p.post_text || '').replace(/\n{3,}/g, '\n\n').substring(0, 300);
    return `
      <div class="post-card">
        <div class="post-meta">
          <span class="username">${escHtml(p.username || '未知帳號')}</span>
          <span class="kw-tag">${escHtml(p.keyword)}</span>
          ${timeStr ? `<span class="time">${timeStr}</span>` : ''}
        </div>
        <div class="post-text">${escHtml(text)}${(p.post_text||'').length > 300 ? '...' : ''}</div>
      </div>
    `;
  }).join('');
}

// ── 渲染洞察 ───────────────────────────────────────────────
function renderInsights(posts) {
  const container = document.getElementById('insightsContainer');
  const allText = posts.map(p => p.post_text || '').join(' ');

  const insights = [];

  if (allText.includes('天機試煉場')) {
    insights.push({
      title: '天機試煉場紅利仍在',
      body: '多篇帖文顯示這部韓綜持續為台灣命理市場帶入新受眾，他們有需求、有預算、但還沒有信任的老師。',
      action: '<strong>可發的文：</strong>「看完天機試煉場你有什麼感覺？」切入，給第一次接觸命理的人認識大寶老師的理由。'
    });
  }
  if (allText.includes('AI') || allText.includes('人工智慧')) {
    insights.push({
      title: 'AI算命話題是你的切入點',
      body: '「AI算命準不準」是高討論度話題。但沒有人能提供的是——真人命理師的精準定盤、對話感、及生命場域的引導。',
      action: '<strong>可發的文：</strong>用「AI排錯盤、我幫客戶重新定盤」的真實案例，強化你的不可取代性。'
    });
  }
  if (allText.includes('夫妻') || allText.includes('感情')) {
    insights.push({
      title: '感情議題內容有流量',
      body: '感情卡關、夫妻宮、情劫等話題在最新抓取中頻繁出現，說明受眾焦慮點仍集中在感情。',
      action: '<strong>可發的文：</strong>不說宮位術語，用「你天生談感情的方式」切入，用故事帶出紫微對感情觀的詮釋。'
    });
  }
  if (allText.includes('推薦') || allText.includes('哪裡')) {
    insights.push({
      title: '受眾在問「找哪位老師」',
      body: '有多篇貼文是網友公開詢問推薦算命師，這是直接的預約意圖，主動留言回覆轉換率極高。',
      action: '<strong>可做的事：</strong>主動找到這類貼文留言，提供你的諮詢資訊，這是最直接的引流。'
    });
  }

  if (insights.length === 0) {
    insights.push({
      title: '抓取更多資料以產生洞察',
      body: '目前資料量不足以分析趨勢，請多執行幾次抓取，系統會自動根據內容產生對應的策略建議。',
      action: '<strong>建議：</strong>每天早上點一次「立即抓取新資料」，累積 3-5 天後洞察會更精準。'
    });
  }

  container.innerHTML = insights.map(ins => `
    <div class="insight-card">
      <h3>${ins.title}</h3>
      <p>${ins.body}</p>
      <div class="action">${ins.action}</div>
    </div>
  `).join('');
}

// ── 渲染帳號列表 ───────────────────────────────────────────
function renderAccounts(posts) {
  const container = document.getElementById('accountsContainer');
  const accounts = {};
  posts.forEach(p => {
    if (!p.username) return;
    if (!accounts[p.username]) accounts[p.username] = { count: 0, keywords: new Set() };
    accounts[p.username].count++;
    accounts[p.username].keywords.add(p.keyword);
  });
  const sorted = Object.entries(accounts).sort((a,b) => b[1].count - a[1].count);
  container.innerHTML = sorted.slice(0, 8).map(([username, info]) => `
    <div style="margin-bottom:12px;">
      <div style="color:var(--accent);font-weight:600;font-size:14px;">${escHtml(username)}</div>
      <div style="font-size:12px;color:var(--muted);">出現 ${info.count} 次 ｜ ${Array.from(info.keywords).join('・')}</div>
    </div>
  `).join('') || '<div style="color:var(--muted);font-size:13px;">尚無資料</div>';
}

// ── 空狀態 ─────────────────────────────────────────────────
function renderEmpty() {
  document.getElementById('lastUpdateTime').textContent = '尚未抓取';
  document.getElementById('statTotal').textContent = '0';
  document.getElementById('statBatch').textContent = '0 篇';
  document.getElementById('postsContainer').innerHTML = `
    <div class="empty-state">
      <div class="icon">🌙</div>
      <p>資料庫還是空的<br>點右上角「立即抓取新資料」開始第一次抓取</p>
    </div>`;
  document.getElementById('keywordBars').innerHTML = '<div style="color:var(--muted);font-size:13px;">抓取後自動顯示</div>';
  document.getElementById('trendTags').innerHTML = '<div style="color:var(--muted);font-size:13px;">抓取後自動顯示</div>';
  document.getElementById('insightsContainer').innerHTML = '<div style="color:var(--muted);font-size:13px;padding:20px 0;">抓取後自動分析</div>';
  document.getElementById('accountsContainer').innerHTML = '<div style="color:var(--muted);font-size:13px;">抓取後自動顯示</div>';
}

// ── 立即抓取說明 + 重新整理 ────────────────────────────────
async function triggerScrape() {
  if (isScraping) return;

  // 先重新整理一次 Supabase 的資料
  isScraping = true;
  const btn = document.getElementById('scrapeBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<div class="spinner" style="border-top-color:var(--muted);"></div> 更新中...';
  showNotice('正在從資料庫載入最新資料...', 'info');

  await loadData();

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.innerHTML = '⚡ 立即抓取新資料';
  isScraping = false;
  showNotice('✅ 顯示已更新為最新資料庫內容。若要抓取全新 Threads 貼文，請到 Cowork 側邊欄 → Scheduled → threads-mingli-monitor → Run Now', 'success', 8000);
}

// ── 登出 ───────────────────────────────────────────────────
async function logout() {
  sessionStorage.removeItem('dabao_auth');
  await sb.auth.signOut();
  window.location.href = 'index.html';
}

// ── HTML 跳脫 ──────────────────────────────────────────────
function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 啟動
loadData();
</script>
